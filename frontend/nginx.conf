server {
  # nginx-unprivileged runs as a non-root user; 8080 is its default
  # unprivileged port (binding 80 would require root).
  listen 8080;

  # Security headers — applied to every response (`always`) so they are
  # present even when the frontend is reached directly, not only via Traefik.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri /index.html =404;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
