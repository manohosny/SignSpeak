server {
  # nginx-unprivileged runs as a non-root user; 8080 is its default
  # unprivileged port (binding 80 would require root).
  listen 8080;
  root /usr/share/nginx/html;

  # Security headers — applied to every response (`always`) so they are
  # present even when the frontend is reached directly, not only via Traefik.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Browser pose models (YOLOX + RTMW, ~143 MB total). Content-stable filenames,
  # so cache hard in the browser — downloaded once, then served from cache on
  # every later visit/reload. 404 (never the SPA fallback) if a file is missing,
  # so onnxruntime never receives HTML to parse as a model.
  location /models/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff" always;
  }

  # Vite-hashed build assets are immutable by name.
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff" always;
  }

  location / {
    index index.html index.htm;
    try_files $uri /index.html =404;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
